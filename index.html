<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F6F3ED" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1E1C19" media="(prefers-color-scheme: dark)">
<meta name="description" content="重症心身障害のあるお子さんの特徴を、必要な情報だけサッと伝えられるプロフィールカード">

<!-- セキュリティ:外部への接続を一切許可しない(データはこの端末から出ていきません) -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex, nofollow">

<title>サポートカード</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app"><div class="lock-wrap"><div class="spinner">読み込み中…</div></div></div>
<div id="print" class="print-area"></div>
<div id="toast" class="toast" role="status">✓ 保存しました</div>
<input type="file" id="photoInput" accept="image/*" style="display:none">
<input type="file" id="importInput" accept=".json,.scard,application/json" style="display:none">
<script src="app.js"></script>
</body>
</html>
